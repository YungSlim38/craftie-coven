<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background is transparent so the page's own background color shows through -->

  <!-- Squiggly line 1 -->
  <path d="M 0 60 Q 40 40, 80 60 T 160 60" stroke="#E7B8E0" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Squiggly line 2 -->
  <path d="M 240 100 Q 280 80, 320 100 T 400 100" stroke="#E7B8E0" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Squiggly line 3 -->
  <path d="M 20 220 Q 60 200, 100 220 T 180 220" stroke="#E7B8E0" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Squiggly line 4 -->
  <path d="M 260 300 Q 300 280, 340 300 T 400 300" stroke="#E7B8E0" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Simple thread spool icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="30" height="40" rx="4" fill="#C97BC4"/>
    <ellipse cx="15" cy="0" rx="15" ry="6" fill="#B85FB2"/>
    <ellipse cx="15" cy="40" rx="15" ry="6" fill="#B85FB2"/>
    <path d="M 15 -6 Q 40 5, 45 25" stroke="#B85FB2" stroke-width="3" fill="none"/>
  </g>

  <!-- Simple cat face icon -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="22" fill="#D98BD4"/>
    <polygon points="-18,-14 -6,-24 -10,-6" fill="#D98BD4"/>
    <polygon points="18,-14 6,-24 10,-6" fill="#D98BD4"/>
    <circle cx="-8" cy="-2" r="2.5" fill="#4A2E48"/>
    <circle cx="8" cy="-2" r="2.5" fill="#4A2E48"/>
    <path d="M -4 8 Q 0 12, 4 8" stroke="#4A2E48" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Simple pig face icon -->
  <g transform="translate(120, 320)">
    <circle cx="0" cy="0" r="20" fill="#F0AEE8"/>
    <ellipse cx="0" cy="4" rx="9" ry="7" fill="#D98BD4"/>
    <circle cx="-3" cy="4" r="1.6" fill="#4A2E48"/>
    <circle cx="3" cy="4" r="1.6" fill="#4A2E48"/>
    <circle cx="-10" cy="-12" r="5" fill="#F0AEE8"/>
    <circle cx="10" cy="-12" r="5" fill="#F0AEE8"/>
  </g>
</svg>
